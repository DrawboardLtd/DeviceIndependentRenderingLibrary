name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  # 6.4 - MTSDF rasterization path (RasterizeGlyphMtsdf) + glyph-identity resolver
  #       (ResolveGlyphIdentity) and Type1-by-name MTSDF; drops the stb PNG port
  #       (SharpAstro.Fonts 1.5 / Png 3.4).
  # 6.7 - DIR.Lib.Shaping ITextShaper adapter with full UAX #9 bidi.
  # 6.8 - rebuild against SharpAstro.Fonts.Shaping 1.5.551; + SignalDirectory source
  #       generator (DIR.Lib.SourceGenerators) + SignalJson binder.
  # 6.9 - memoize ResolveGlyphIdentity (session-stable identity cache) +
  #       SharpAstro.Fonts 1.6 (bare-CFF CIDFontType0 loading).
  # 6.11 - hoist the backend-neutral SDF atlas core into DIR.Lib: SdfFontAtlas owns
  #        keying / packing / LRU / budgets / disk cache / async rasterize, GPU backends
  #        implement ISdfAtlasBackend; SdfGlyphDiskCache moved here from SdlVulkan.Renderer
  #        (.sdfg FormatVersion 6, + read-only mode for single-threaded hosts); AtlasDiag.
  VERSION_PREFIX: 6.13.${{ github.run_number }}
  VERSION_REV: ${{ github.run_attempt }}
  VERSION_HASH: +${{ github.sha }}
  BUILD_CONF: Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build -c $BUILD_CONF --no-restore -p:Version=${VERSION_PREFIX}${VERSION_REV}${VERSION_HASH} -p:FileVersion=${VERSION_PREFIX}.${VERSION_REV} -p:ContinuousIntegrationBuild=true
    - name: Test
      run: dotnet test -c $BUILD_CONF --no-build
    - name: Upload NuGet package
      uses: actions/upload-artifact@v4
      with:
        name: nuget-packages
        path: '**/*.nupkg'
        retention-days: 5
